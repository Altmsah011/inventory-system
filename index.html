<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نظام إدارة المخازن</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen">
    <div class="bg-white p-8 rounded-2xl shadow-xl w-96">
        <h2 class="text-2xl font-bold mb-6 text-center text-blue-600">تسجيل الدخول</h2>
        <input id="username" type="text" placeholder="اسم المستخدم" class="w-full p-3 mb-4 border rounded-lg">
        <input id="password" type="password" placeholder="كلمة المرور" class="w-full p-3 mb-6 border rounded-lg">
        <button onclick="login()" class="w-full bg-blue-600 text-white py-3 rounded-lg hover:bg-blue-700 transition">دخول</button>
        <p id="msg" class="mt-4 text-center text-red-500"></p>
    </div>

    <script>
        // هنا قمت بوضع رابطك الذي نسخته
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzyEcTxEe3xDD_78EtkTf38uSMPE50NhQRYmpAWJY1GD4eGKlqGDWUFwEX0cF1TABfi/exec";

        async function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            document.getElementById('msg').innerText = "جاري التحقق...";
            
            try {
                const response = await fetch(WEB_APP_URL, {
                    method: "POST",
                    body: JSON.stringify({action: "login", username, password})
                });
                const data = await response.json();
                
                if(data.status === "success") {
                    alert("تم الدخول بنجاح! الموقع: " + data.location + " - القسم: " + data.department);
                } else {
                    document.getElementById('msg').innerText = "خطأ: اسم المستخدم أو كلمة المرور غير صحيحة";
                }
            } catch(e) {
                document.getElementById('msg').innerText = "حدث خطأ في الاتصال بالسيرفر";
            }
        }
    </script>
</body>
</html>
