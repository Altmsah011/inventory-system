<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تسجيل الدخول</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen">
    <div class="bg-white p-8 rounded-2xl shadow-xl w-96">
        <h2 class="text-xl mb-4 text-center">تسجيل الدخول</h2>
        <input id="u" class="w-full p-3 mb-4 border rounded-lg" placeholder="اسم المستخدم">
        <input id="p" type="password" class="w-full p-3 mb-6 border rounded-lg" placeholder="كلمة المرور">
        <button onclick="login()" class="w-full bg-blue-600 text-white py-3 rounded-lg">دخول</button>
        <p id="msg" class="mt-4 text-center text-red-500"></p>
    </div>
    <script>
        const WEB_APP_URL = "ضع_رابطك_هنا"; // ضع رابط Apps Script هنا
        async function login() {
            let res = await fetch(WEB_APP_URL, {
                method: "POST",
                body: JSON.stringify({
                    action: "login",
                    username: document.getElementById('u').value,
                    password: document.getElementById('p').value
                })
            });
            let data = await res.json();
            if (data.status === "success") {
                localStorage.setItem("loc", data.location);
                localStorage.setItem("dept", data.department);
                window.location.href = "dashboard.html";
            } else {
                document.getElementById('msg').innerText = "خطأ في اسم المستخدم أو كلمة المرور";
            }
        }
    </script>
</body>
</html>
