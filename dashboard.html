<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة التحكم</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="p-8">
    <h2 class="text-2xl font-bold mb-6 text-center">الأصناف المتاحة</h2>
    <table class="w-full bg-white shadow-md rounded border">
        <thead>
            <tr class="bg-gray-200">
                <th class="p-2 border">اسم الصنف</th>
                <th class="p-2 border">الكمية</th>
            </tr>
        </thead>
        <tbody id="t"></tbody>
    </table>
    <script>
        const WEB_APP_URL = "ضع_رابطك_هنا"; // نفس رابط Apps Script
        async function load() {
            let res = await fetch(WEB_APP_URL, {
                method: "POST",
                body: JSON.stringify({
                    action: "getData",
                    location: localStorage.getItem("loc"),
                    department: localStorage.getItem("dept")
                })
            });
            let d = await res.json();
            let tbody = document.getElementById('t');
            d.data.forEach(row => {
                tbody.innerHTML += `<tr>
                    <td class="p-2 border">${row[1]}</td>
                    <td class="p-2 border">${row[5]}</td>
                </tr>`;
            });
        }
        load();
    </script>
</body>
</html>
